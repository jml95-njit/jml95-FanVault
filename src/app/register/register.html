<div class="page-wrapper">
    <div class="form-container">
        <div class="logo">FanVault</div>
        <h2>Create an Account</h2>
        <p style="color: #aaa; font-size: 14px; margin-bottom: 20px;">Join to track tours and shop official merch.</p>

        <input type="text" placeholder="Username" [(ngModel)]="username" name="username" required>
        
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required>

        <p *ngIf="errorMessage" style="color: #ff4d4d; font-size: 14px;">{{ errorMessage }}</p>

        <button class="btn" (click)="onRegister()">Create Account</button>

        <div class="links">
            <p>Already have an account? <a routerLink="/login">Login here</a>.</p>
        </div>
    </div>
</div>
