<div class="page-wrapper">
    <div class="form-container">
        <div class="logo">FanVault</div>
        <h2>Welcome Back</h2>
        <p style="color: #aaa; font-size: 14px; margin-bottom: 20px;">Log in to access your account.</p>

        <input type="text" placeholder="Username" [(ngModel)]="username" name="username" required>
        
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required>

        <p *ngIf="errorMessage" style="color: #ff4d4d; font-size: 14px;">{{ errorMessage }}</p>

        <button class="btn" (click)="onLogin()">Log In</button>

        <div class="links">
            <p>Don't have an account? <a routerLink="/register">Register here</a>.</p>
        </div>
    </div>
</div>
